<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뉴 라이프 클래스 출석부</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','맑은 고딕',sans-serif;background:linear-gradient(140deg,#4F46E5 0%,#7C3AED 50%,#9333EA 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .wrap{width:100%;max-width:420px}
    .logo{text-align:center;margin-bottom:32px;color:white}
    .logo h1{font-size:1.7rem;font-weight:900;letter-spacing:-0.5px}
    .logo p{color:rgba(255,255,255,.7);margin-top:6px;font-size:.9rem}
    .date{color:rgba(255,255,255,.6);font-size:.82rem;margin-top:6px}
    .card{background:white;border-radius:20px;padding:22px 20px;margin-bottom:12px;display:flex;align-items:center;gap:18px;text-decoration:none;color:inherit;box-shadow:0 4px 20px rgba(0,0,0,.15);transition:transform .15s,box-shadow .15s;cursor:pointer}
    .card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.2)}
    .card:active{transform:scale(.98)}
    .card-icon{font-size:2.2rem;width:56px;text-align:center;flex-shrink:0}
    .card-body{flex:1}
    .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:700;margin-bottom:5px}
    .b-blue{background:#EEF2FF;color:#4F46E5}
    .b-green{background:#D1FAE5;color:#059669}
    .b-gray{background:#F3F4F6;color:#6B7280}
    .card h2{font-size:1rem;font-weight:800;color:#1F2937;margin-bottom:3px}
    .card p{font-size:.8rem;color:#9CA3AF;line-height:1.4}
    .arrow{color:#D1D5DB;font-size:1.1rem}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <h1>📋 뉴 라이프 클래스</h1>
      <p>출석부</p>
      <div class="date" id="dateStr"></div>
    </div>
    <a class="card" href="attend.html">
      <div class="card-icon">✍️</div>
      <div class="card-body">
        <span class="badge b-blue">방식 1</span>
        <h2>이름 입력으로 출석</h2>
        <p>공용 QR 스캔 후 이름 직접 입력</p>
      </div>
      <span class="arrow">›</span>
    </a>
    <a class="card" href="scan.html">
      <div class="card-icon">🎫</div>
      <div class="card-body">
        <span class="badge b-green">방식 2</span>
        <h2>개인 QR코드로 출석</h2>
        <p>개인 QR코드를 카메라에 인식 → 자동 등록</p>
      </div>
      <span class="arrow">›</span>
    </a>
    <a class="card" href="admin.html">
      <div class="card-icon">⚙️</div>
      <div class="card-body">
        <span class="badge b-gray">관리자</span>
        <h2>관리자 페이지</h2>
        <p>학생 QR 생성 · 공용 QR 출력</p>
      </div>
      <span class="arrow">›</span>
    </a>
  </div>
  <script>
    document.getElementById('dateStr').textContent =
      new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  </script>
</body>
</html>
