<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>뉴 라이프 클래스 출석부</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overscroll-behavior:none}
    body{font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:#080818;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px;position:relative;overflow:hidden}
    body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 20%,rgba(99,102,241,.35) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 70%,rgba(168,85,247,.3) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 50% 100%,rgba(59,130,246,.25) 0%,transparent 60%);animation:aurora 8s ease-in-out infinite alternate;pointer-events:none}
    @keyframes aurora{0%{opacity:1;transform:scale(1)}100%{opacity:.7;transform:scale(1.08)}}
    .header{text-align:center;margin-bottom:28px}
    .org-name{font-size:38px;font-weight:900;color:rgba(255,255,255,.9);letter-spacing:-1px;margin-bottom:4px}
    .header-title{font-size:38px;font-weight:900;letter-spacing:-1px}
    .header-title span{background:linear-gradient(135deg,#818cf8,#c084fc,#67e8f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .card{background:rgba(255,255,255,.04);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.12);border-radius:32px;padding:40px 28px 36px;width:100%;max-width:460px;box-shadow:0 24px 64px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.1);position:relative;z-index:1}
    .input-label{display:block;font-size:26px;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:14px}
    input[type=text]{width:100%;padding:22px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);border-radius:20px;font-size:32px;font-weight:700;font-family:inherit;color:#fff;outline:none;transition:border-color .2s;-webkit-appearance:none;caret-color:#c084fc}
    input[type=text]:focus{border-color:rgba(192,132,252,.6);background:rgba(255,255,255,.1);box-shadow:0 0 0 4px rgba(192,132,252,.15)}
    input[type=text]::placeholder{color:rgba(255,255,255,.25)}
    .submit-btn{width:100%;margin-top:20px;padding:26px;background:linear-gradient(135deg,#6366f1,#8b5cf6,#a855f7);color:#fff;border:none;border-radius:20px;font-size:24px;font-weight:800;font-family:inherit;cursor:pointer;box-shadow:0 8px 32px rgba(99,102,241,.45);transition:transform .12s;-webkit-appearance:none;touch-action:manipulation}
    .submit-btn:active{transform:scale(.97)}
    .submit-btn:disabled{opacity:.5;cursor:not-allowed}
    .result{display:none;text-align:center}
    .result.show{display:block;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
    .form-wrap.hide{display:none}
    .check-circle{width:100px;height:100px;background:linear-gradient(135deg,#6366f1,#a855f7);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:50px;box-shadow:0 12px 40px rgba(99,102,241,.5)}
    .success-name{font-size:42px;font-weight:900;color:#fff;margin-bottom:8px;letter-spacing:-1px}
    .success-msg{font-size:20px;font-weight:600;color:rgba(255,255,255,.6);margin-bottom:8px}
    .success-time{font-size:16px;color:rgba(255,255,255,.35);margin-bottom:36px}
    .again-btn{width:100%;padding:22px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);border-radius:20px;font-size:20px;font-weight:700;font-family:inherit;cursor:pointer;touch-action:manipulation;-webkit-appearance:none}
    @keyframes pop{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
  </style>
</head>
<body>
  <div class="header">
    <p class="org-name">뉴 라이프 클래스</p>
    <h1 class="header-title"><span>출석 체크</span></h1>
  </div>
  <div class="card">
    <div class="form-wrap" id="formWrap">
      <label class="input-label" for="nameInput">이름을 입력하세요</label>
      <form id="attendForm">
        <input type="text" id="nameInput" placeholder="홍길동"
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus required />
        <button type="submit" class="submit-btn" id="submitBtn">출석 등록 →</button>
      </form>
    </div>
    <div class="result" id="resultSection">
      <div class="check-circle">✓</div>
      <div class="success-name" id="resultName"></div>
      <div class="success-msg">출석이 완료되었습니다</div>
      <div class="success-time" id="resultTime"></div>
      <button class="again-btn" onclick="resetForm()">↩ 다른 사람 등록</button>
    </div>
  </div>
  <script>
    var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxzSlza3JQWdwDELV5lcxklhg6jdraYpqg5zD7q59Vv-csfKUsDGb4Fu_Kry0JfO8Yc/exec';

    document.getElementById('attendForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var name = document.getElementById('nameInput').value.trim();
      if (!name) return;
      var btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = '등록 중...';
      var now = new Date();
      var t = now.toLocaleString('ko-KR',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false});
      // 낙관적 UI 먼저 표시
      document.getElementById('resultName').textContent = name + ' 님';
      document.getElementById('resultTime').textContent = t;
      document.getElementById('formWrap').classList.add('hide');
      document.getElementById('resultSection').classList.add('show');
      // Apps Script 전송
      fetch(SCRIPT_URL, {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'name=' + encodeURIComponent(name) + '&type=style1',
        redirect: 'follow'
      }).catch(function(){});
      btn.disabled = false; btn.textContent = '출석 등록 →';
    });

    function resetForm() {
      document.getElementById('nameInput').value = '';
      document.getElementById('resultSection').classList.remove('show');
      document.getElementById('formWrap').classList.remove('hide');
      setTimeout(function(){ document.getElementById('nameInput').focus(); }, 100);
    }
  </script>
</body>
</html>
