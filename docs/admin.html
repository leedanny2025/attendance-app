<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>관리자 — 뉴 라이프 클래스 출석부</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overscroll-behavior:none}
    body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','맑은 고딕',sans-serif;background:#F0F4FF;min-height:100dvh;color:#1F2937}
    .header{background:linear-gradient(135deg,#4F46E5,#7C3AED);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 16px rgba(79,70,229,.3)}
    .header-left h1{color:white;font-size:.95rem;font-weight:800}
    .header-left p{color:rgba(255,255,255,.65);font-size:.72rem;margin-top:2px}
    .header-links{display:flex;gap:6px}
    .header-links a{color:rgba(255,255,255,.9);text-decoration:none;font-size:.75rem;padding:7px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.3);touch-action:manipulation;white-space:nowrap}
    .header-links a:active{background:rgba(255,255,255,.25)}
    .tabs{display:flex;background:white;border-bottom:2px solid #E5E7EB;padding:0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .tab{padding:14px 18px;font-size:.88rem;font-weight:700;color:#9CA3AF;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;margin-bottom:-2px;touch-action:manipulation;min-height:48px;display:flex;align-items:center}
    .tab.active{color:#4F46E5;border-bottom-color:#4F46E5}
    .content{max-width:720px;margin:0 auto;padding:16px 12px}
    .section{display:none}
    .section.active{display:block}
    .card{background:white;border-radius:18px;padding:18px 16px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
    .card-title{font-size:.95rem;font-weight:800;color:#1F2937;margin-bottom:14px}
    .input-col{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
    .input-row2{display:flex;gap:8px}
    .input-col input{width:100%;border:2px solid #E5E7EB;border-radius:12px;padding:14px 16px;font-size:16px;font-family:inherit;outline:none;transition:border-color .2s;color:#1F2937;-webkit-appearance:none}
    .input-col input:focus{border-color:#4F46E5}
    .hint{font-size:.76rem;color:#9CA3AF}
    .btn{border:none;border-radius:12px;padding:14px 20px;font-size:.9rem;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap;touch-action:manipulation;min-height:48px;display:inline-flex;align-items:center;justify-content:center;-webkit-appearance:none}
    .btn:active{transform:scale(.96);opacity:.85}
    .btn-primary{background:#4F46E5;color:white}
    .btn-green{background:#10B981;color:white}
    .btn-outline{background:white;color:#4F46E5;border:2px solid #4F46E5}
    .btn-red{background:#FEE2E2;color:#DC2626;min-height:44px;padding:10px 16px;font-size:.85rem;font-weight:700}
    .btn-gray{background:#F3F4F6;color:#6B7280}
    .btn-sm{padding:10px 16px;font-size:.85rem;min-height:44px}
    .student-list{margin-top:4px}
    .student-row{display:flex;align-items:center;justify-content:space-between;padding:12px 4px;border-bottom:1px solid #F3F4F6;min-height:60px}
    .student-row:last-child{border-bottom:none}
    .s-info{display:flex;align-items:center;gap:12px}
    .avatar{width:42px;height:42px;background:linear-gradient(135deg,#4F46E5,#7C3AED);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:1rem;flex-shrink:0}
    .s-name{font-weight:700;font-size:.95rem}
    .s-id{font-size:.75rem;color:#9CA3AF}
    .empty{text-align:center;color:#9CA3AF;padding:32px 0;font-size:.88rem}
    .action-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px}
    .count-badge{background:#EEF2FF;color:#4F46E5;padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:700}
    .qr-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    @media(min-width:480px){.qr-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}}
    .qr-item{background:white;border:2px solid #E5E7EB;border-radius:16px;padding:14px 10px;text-align:center}
    .qr-item:active{border-color:#4F46E5}
    .qr-img-wrap{width:100%;aspect-ratio:1;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;background:#F8FAFF;border-radius:8px;overflow:hidden;cursor:pointer}
    .qr-img-wrap img{width:100%;height:100%;display:block;object-fit:contain}
    .qr-name{font-weight:800;font-size:.88rem;color:#1F2937}
    .qr-id-label{font-size:.72rem;color:#9CA3AF;margin-bottom:10px;min-height:16px}
    .qr-item .btn{width:100%}
    .public-qr-center{display:flex;flex-direction:column;align-items:center;gap:16px}
    .public-qr-box{background:#F8FAFF;border:2px solid #C7D2FE;border-radius:16px;padding:20px;display:flex;align-items:center;justify-content:center;min-width:220px;min-height:220px;width:100%;max-width:300px}
    .public-qr-box img{display:block;border-radius:8px;width:100%;height:auto}
    .url-pill{background:#F3F4F6;border-radius:10px;padding:10px 16px;font-size:.75rem;color:#6B7280;word-break:break-all;text-align:center;width:100%}
    .btn-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%}
    .btn-row .btn{flex:1;min-width:100px}
    .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
    .modal-backdrop.show{display:flex}
    .modal-box{background:white;border-radius:28px;padding:28px 20px;text-align:center;max-width:340px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.4);animation:popIn .25s cubic-bezier(.34,1.56,.64,1);position:relative}
    @keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
    .modal-close{position:absolute;top:14px;right:14px;background:#F3F4F6;border:none;border-radius:50%;width:36px;height:36px;font-size:1rem;cursor:pointer;color:#6B7280;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
    .modal-qr-wrap{background:#F8FAFF;border:2px solid #E0E7FF;border-radius:16px;padding:14px;display:inline-block;margin-bottom:14px;cursor:pointer}
    .modal-qr-wrap img{display:block;border-radius:8px}
    .modal-name{font-size:1.4rem;font-weight:900;color:#1F2937;margin-bottom:4px}
    .modal-id{font-size:.85rem;color:#9CA3AF;margin-bottom:18px;min-height:20px}
    .modal-btns{display:flex;gap:10px;justify-content:center}
    .modal-btns .btn{flex:1}
    .toast{position:fixed;bottom:max(24px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#1F2937;color:white;padding:12px 24px;border-radius:24px;font-size:.88rem;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:9999;max-width:90vw;text-align:center}
    .toast.show{opacity:1}
    @media print{
      .header,.tabs,.action-bar,.card:not(#qrPrintCard){display:none!important}
      body{background:white}
      #qrPrintCard{display:block!important;box-shadow:none;padding:0}
      .qr-grid{grid-template-columns:repeat(4,1fr);gap:12px}
      .qr-item{break-inside:avoid;border:1px solid #ddd}
      .btn{display:none!important}
    }
  </style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <h1>⚙️ 관리자 — 뉴 라이프 클래스</h1>
    <p>출석부 관리 시스템</p>
  </div>
  <div class="header-links">
    <a href="scan.html">📷 QR 스캔</a>
    <a href="attend.html">✍️ 출석 폼</a>
    <a href="https://docs.google.com/spreadsheets/d/1g-cWbaRneKY_9rbsj7yCSYpKiC_pXeRAD5qkBus56Es/edit" target="_blank">📊 시트</a>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab(this,'students')">👥 학생 관리 &amp; QR 생성</div>
  <div class="tab" onclick="showTab(this,'publicqr')">📋 공용 QR 출력</div>
</div>

<div class="content">
  <!-- 학생 관리 탭 -->
  <div class="section active" id="tab-students">
    <div class="card">
      <div class="card-title">➕ 학생 추가</div>
      <div class="input-col">
        <input type="text" id="nameInput" placeholder="이름 (예: 홍길동)" autocomplete="off" autocorrect="off" autocapitalize="off"/>
        <div class="input-row2">
          <input type="text" id="idInput" placeholder="학번 (선택)" style="flex:1" autocomplete="off"/>
          <button class="btn btn-primary" onclick="addStudent()" style="flex-shrink:0">추가</button>
        </div>
      </div>
      <p class="hint">여러 명: 쉼표로 구분 &nbsp;예) 홍길동, 김철수, 이영희</p>
    </div>

    <div class="card">
      <div class="action-bar">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:.95rem;font-weight:800;">👥 학생 목록</span>
          <span class="count-badge" id="countBadge" style="display:none;"></span>
        </div>
        <button class="btn btn-red btn-sm" id="clearAllBtn" style="display:none;" onclick="clearAll()">전체 삭제</button>
      </div>
      <div id="studentList" class="student-list">
        <div class="empty">로딩 중...</div>
      </div>
    </div>

    <div class="card" id="qrPrintCard" style="display:none;">
      <div class="action-bar">
        <div>
          <span style="font-size:.95rem;font-weight:800;">🎫 개인 QR 코드</span>
          <span style="font-size:.78rem;color:#9CA3AF;margin-left:8px;">방식 2용 — 인쇄해서 학생에게 배포</span>
        </div>
        <button class="btn btn-green btn-sm" onclick="window.print()">🖨️ 전체 인쇄</button>
      </div>
      <div class="qr-grid" id="qrGrid"></div>
    </div>
  </div>

  <!-- 공용 QR 탭 -->
  <div class="section" id="tab-publicqr">
    <div class="card">
      <div class="card-title">📋 방식 1 — 공용 QR 코드</div>
      <p style="font-size:.85rem;color:#6B7280;line-height:1.7;margin-bottom:20px;">
        이 QR코드를 프린트해서 교실에 붙여두세요.<br>
        학생이 스캔하면 이름 입력 페이지로 이동합니다.<br>
        <span style="color:#10B981;font-weight:600;">✓ 어느 네트워크에서든 접속 가능</span>
      </p>
      <div class="public-qr-center">
        <div class="public-qr-box" id="publicQrBox"><div class="qr-spinner"></div></div>
        <div class="url-pill" id="publicQrUrl">로딩 중...</div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="genPublicQR()">🔄 재생성</button>
          <button class="btn btn-outline" id="dlBtn" style="display:none" onclick="dlPublicQR()">⬇️ 다운로드</button>
          <button class="btn btn-gray"    id="prBtn" style="display:none" onclick="prPublicQR()">🖨️ 인쇄</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 확대 모달 -->
<div class="modal-backdrop" id="qrModal" onclick="closeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-qr-wrap" onclick="dlFromModal()">
      <img id="modalQrImg" src="" width="280" height="280" alt="QR 코드" title="클릭하면 저장됩니다"/>
    </div>
    <div class="modal-name" id="modalName"></div>
    <div class="modal-id"   id="modalId"></div>
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="dlFromModal()">⬇️ 저장</button>
      <button class="btn btn-gray"    onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxzSlza3JQWdwDELV5lcxklhg6jdraYpqg5zD7q59Vv-csfKUsDGb4Fu_Kry0JfO8Yc/exec';
  var QR_API     = 'https://api.qrserver.com/v1/create-qr-code/?color=1F2937&bgcolor=ffffff&format=png&size=';
  var students   = [];

  // ── JSONP ──
  function callScript(params) {
    return new Promise(function(resolve, reject) {
      var cb   = '_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      var url  = new URL(SCRIPT_URL);
      Object.entries(params).forEach(function(kv){ url.searchParams.set(kv[0], kv[1]); });
      url.searchParams.set('callback', cb);
      var t = setTimeout(function(){ delete window[cb]; s.remove(); reject(new Error('시간 초과')); }, 12000);
      window[cb] = function(data){ clearTimeout(t); delete window[cb]; s.remove(); resolve(data); };
      var s = document.createElement('script');
      s.src     = url.toString();
      s.onerror = function(){ clearTimeout(t); delete window[cb]; reject(new Error('연결 오류')); };
      document.head.appendChild(s);
    });
  }

  // ── 탭 ──
  function showTab(el, name) {
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    document.querySelectorAll('.section').forEach(function(s){ s.classList.remove('active'); });
    el.classList.add('active');
    document.getElementById('tab-'+name).classList.add('active');
    if (name === 'publicqr') genPublicQR();
  }

  // ── 학생 로드 ──
  async function loadStudents() {
    try {
      var res = await callScript({action:'getStudents'});
      students = res.students || [];
    } catch(e) { students = []; }
    render();
  }

  var _adding = false;

  // ── 학생 추가 ──
  async function addStudent() {
    if (_adding) return;
    var nameRaw = document.getElementById('nameInput').value.trim();
    var id      = document.getElementById('idInput').value.trim();
    if (!nameRaw) { document.getElementById('nameInput').focus(); return; }
    _adding = true;

    try {
      var names = nameRaw.split(/[,，、\n]/).map(function(n){ return n.trim(); }).filter(Boolean);

      // 즉시 화면에 추가 (낙관적 UI)
      names.forEach(function(name, i) {
        students.push({ name: name, id: names.length === 1 ? id : '', uid: 'temp_' + Date.now() + '_' + i });
      });
      document.getElementById('nameInput').value = '';
      document.getElementById('idInput').value   = '';
      render();
      toast('✓ ' + names.join(', ') + ' 추가됨');
      document.getElementById('nameInput').focus();

      // 서버에 저장 후 uid 동기화
      for (var i = 0; i < names.length; i++) {
        await callScript({action:'addStudent', name:names[i], id: names.length===1 ? id : ''});
      }
      await loadStudents();
    } catch(e) {
      toast('저장 실패 — 새로고침 후 확인하세요');
    } finally {
      _adding = false;
    }
  }

  // ── 학생 삭제 ──
  function deleteStudent(idx) {
    var s = students[idx];
    if (!s) return;
    students.splice(idx, 1);
    render();
    toast('🗑 ' + s.name + ' 삭제됨');
    callScript({action:'deleteStudent', uid:s.uid}).catch(function(){});
  }

  async function clearAll() {
    if (!confirm('학생 '+students.length+'명을 모두 삭제할까요?')) return;
    var toDelete = students.slice();
    students = [];
    render();
    toast('전체 삭제됐습니다');
    for (var i = 0; i < toDelete.length; i++) {
      callScript({action:'deleteStudent', uid:toDelete[i].uid}).catch(function(){});
    }
  }

  var QR_API = 'https://api.qrserver.com/v1/create-qr-code/?color=1F2937&bgcolor=ffffff&format=png&size=';

  function studentQrData(s) {
    return 'ATT:' + JSON.stringify({n: s.name, id: s.id||''});
  }
  function studentQrSrc(s, size) {
    return QR_API + size + 'x' + size + '&data=' + encodeURIComponent(studentQrData(s));
  }

  // ── 렌더 ──
  function render() {
    var count = students.length;
    document.getElementById('countBadge').style.display  = count ? 'inline' : 'none';
    document.getElementById('countBadge').textContent    = count + '명';
    document.getElementById('clearAllBtn').style.display = count ? 'inline-block' : 'none';
    document.getElementById('qrPrintCard').style.display = count ? 'block' : 'none';

    var listEl = document.getElementById('studentList');
    if (!count) {
      listEl.innerHTML = '<div class="empty">아직 학생이 없습니다.<br>위에서 이름을 입력해 추가하세요.</div>';
      return;
    }
    listEl.innerHTML = '';
    students.forEach(function(s, idx) {
      var row = document.createElement('div');
      row.className = 'student-row';
      row.innerHTML =
        '<div class="s-info">' +
          '<div class="avatar">'+s.name[0]+'</div>' +
          '<div><div class="s-name">'+s.name+'</div>' +
          (s.id ? '<div class="s-id">'+s.id+'</div>' : '') + '</div>' +
        '</div>';
      var btn = document.createElement('button');
      btn.className = 'btn btn-red';
      btn.textContent = '삭제';
      btn.onclick = function(){ deleteStudent(idx); };
      row.appendChild(btn);
      listEl.appendChild(row);
    });

    renderQRGrid();
  }

  function renderQRGrid() {
    var grid = document.getElementById('qrGrid');
    grid.innerHTML = students.map(function(s, idx) {
      var src = studentQrSrc(s, 150);
      return '<div class="qr-item">' +
        '<div class="qr-img-wrap" onclick="openQrModal('+idx+')" title="클릭하면 크게 봅니다">' +
          '<img src="'+src+'" width="150" height="150" loading="lazy" alt="'+s.name+' QR"/>' +
        '</div>' +
        '<div class="qr-name">'+s.name+'</div>' +
        '<div class="qr-id-label">'+(s.id||'')+'</div>' +
        '<button class="btn btn-outline btn-sm" onclick="dlStudentQR('+idx+')">⬇️ 저장</button>' +
      '</div>';
    }).join('');
  }

  // ── 개인 QR 다운로드 ──
  async function dlStudentQR(idx) {
    var s = students[idx];
    var blob = await fetch(studentQrSrc(s, 300)).then(function(r){ return r.blob(); });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'QR_' + s.name + '.png';
    a.click();
    URL.revokeObjectURL(a.href);
    toast(s.name + ' QR 저장됨');
  }

  // ── 공용 QR ──
  function genPublicQR() {
    var src = QR_API + '220x220&data=' + encodeURIComponent(SCRIPT_URL);
    var box = document.getElementById('publicQrBox');
    box.innerHTML = '<img src="'+src+'" width="220" height="220" style="border-radius:8px" alt="공용 QR"/>';
    document.getElementById('publicQrUrl').textContent = SCRIPT_URL;
    document.getElementById('dlBtn').style.display = 'inline-block';
    document.getElementById('prBtn').style.display = 'inline-block';
  }

  async function dlPublicQR() {
    var blob = await fetch(QR_API + '300x300&data=' + encodeURIComponent(SCRIPT_URL)).then(function(r){ return r.blob(); });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'newlife_QR.png'; a.click();
    URL.revokeObjectURL(a.href);
    toast('QR 저장됨');
  }

  function prPublicQR() {
    var src = QR_API + '280x280&data=' + encodeURIComponent(SCRIPT_URL);
    var w = window.open('','_blank');
    w.document.write('<!DOCTYPE html><html><head><title>뉴 라이프 클래스 QR</title>' +
      '<style>body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;text-align:center;padding:30px;background:#fff}' +
      'h2{font-size:1.8rem;margin-bottom:12px;color:#1F2937}img{border:2px solid #eee;border-radius:12px;padding:10px}p{color:#666;font-size:1rem;margin-top:12px}</style>' +
      '</head><body><h2>📋 뉴 라이프 클래스 출석 체크</h2>' +
      '<img src="'+src+'" width="280" height="280"/>' +
      '<p>QR 코드를 스캔하고 이름을 입력하세요</p>' +
      '<script>window.onload=function(){window.print()}<\/script></body></html>');
  }

  // ── 확대 모달 ──
  var _modalIdx = -1;

  function openQrModal(idx) {
    _modalIdx = idx;
    var s = students[idx];
    var src = studentQrSrc(s, 280);
    document.querySelector('.modal-qr-wrap').innerHTML =
      '<img src="'+src+'" width="280" height="280" style="border-radius:8px;display:block" alt="'+s.name+' QR"/>';
    document.getElementById('modalName').textContent = s.name;
    document.getElementById('modalId').textContent   = s.id || '';
    document.getElementById('qrModal').classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closeModal(e) {
    if (e && e.target !== document.getElementById('qrModal')) return;
    document.getElementById('qrModal').classList.remove('show');
    document.body.style.overflow = '';
  }

  function dlFromModal() {
    if (_modalIdx >= 0) dlStudentQR(_modalIdx);
  }

  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') {
      document.getElementById('qrModal').classList.remove('show');
      document.body.style.overflow = '';
    }
  });

  // ── Enter 키 ──
  ['nameInput','idInput'].forEach(function(id){
    document.getElementById(id).addEventListener('keydown', function(e){
      if (e.key === 'Enter') addStudent();
    });
  });

  // ── Toast ──
  var toastTimer;
  function toast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2200);
  }

  // ── 초기화 ──
  loadStudents();
  genPublicQR();
</script>
</body>
</html>
